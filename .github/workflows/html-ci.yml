# This workflow will build and check your HTML files for issues using htmlhint
name: HTML CI

on:
  push:
    branches: [ main, add-contact-form ]
  pull_request:
    branches: [ main ]

jobs:
  html-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install htmlhint
        run: npm install -g htmlhint
      - name: Run htmlhint
        run: htmlhint "**/*.html"
